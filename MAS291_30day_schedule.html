<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lịch học 30 ngày – MAS291 Statistics & Probability</title>
<style>
  :root {
    --primary: #1e3a5f;
    --accent: #2980b9;
    --important: #e74c3c;
    --important-light: #fde8e8;
    --review: #8e44ad;
    --review-light: #f5eaff;
    --normal: #2ecc71;
    --normal-light: #eafaf1;
    --week-bg: #f0f4f8;
    --card-shadow: 0 2px 12px rgba(0,0,0,0.10);
    --modal-shadow: 0 8px 40px rgba(0,0,0,0.22);
    --tag-vn: #27ae60;
    --tag-ta: #2980b9;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f5f7fa;
    color: #222;
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, var(--primary) 0%, #2980b9 100%);
    color: white;
    padding: 32px 24px 24px;
    text-align: center;
  }
  .header h1 { font-size: 2rem; font-weight: 700; margin-bottom: 6px; }
  .header p { font-size: 1rem; opacity: 0.88; margin-bottom: 18px; }
  .legend {
    display: flex; flex-wrap: wrap; gap: 14px;
    justify-content: center; margin-top: 8px;
  }
  .legend-item {
    display: flex; align-items: center; gap: 7px;
    font-size: 0.85rem; background: rgba(255,255,255,0.15);
    padding: 5px 12px; border-radius: 20px;
  }
  .legend-dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; }

  /* PROGRESS BAR */
  .progress-bar-container {
    background: rgba(255,255,255,0.18); border-radius: 8px; height: 8px;
    width: 260px; margin: 14px auto 0; overflow: hidden;
  }
  .progress-bar {
    height: 100%; background: #f9ca24; border-radius: 8px;
    transition: width 0.4s; width: 0%;
  }
  .progress-label { font-size: 0.8rem; margin-top: 6px; opacity: 0.85; }

  /* WEEK SECTIONS */
  .weeks-container { max-width: 1080px; margin: 30px auto; padding: 0 16px 40px; }
  .week-block { margin-bottom: 28px; }
  .week-title {
    font-size: 0.95rem; font-weight: 700; color: var(--primary);
    letter-spacing: 1px; text-transform: uppercase;
    padding: 7px 16px; background: var(--week-bg);
    border-left: 4px solid var(--accent);
    border-radius: 4px; margin-bottom: 12px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .week-tag {
    font-size: 0.75rem; background: var(--accent); color: white;
    padding: 2px 10px; border-radius: 12px; font-weight: 600; letter-spacing: 0;
  }
  .days-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
    gap: 12px;
  }

  /* DAY CARD */
  .day-card {
    background: white;
    border-radius: 12px;
    padding: 14px 14px 12px;
    cursor: pointer;
    box-shadow: var(--card-shadow);
    border-top: 4px solid var(--normal);
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
    user-select: none;
  }
  .day-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.14); }
  .day-card.important { border-top-color: var(--important); background: var(--important-light); }
  .day-card.review { border-top-color: var(--review); background: var(--review-light); }
  .day-card.done { opacity: 0.55; }
  .day-card.done::after {
    content: '✓'; position: absolute; top: 8px; right: 10px;
    color: #27ae60; font-weight: 700; font-size: 1.1rem;
  }

  .day-num {
    font-size: 0.72rem; font-weight: 700; color: #888;
    text-transform: uppercase; letter-spacing: 1px;
  }
  .day-card.important .day-num { color: var(--important); }
  .day-card.review .day-num { color: var(--review); }

  .day-title { font-size: 0.88rem; font-weight: 600; margin: 4px 0 6px; line-height: 1.35; }
  .day-chapter {
    font-size: 0.74rem; background: #e8f4fd; color: var(--accent);
    padding: 2px 8px; border-radius: 10px; display: inline-block; font-weight: 600;
  }
  .day-card.important .day-chapter { background: #fde8e8; color: var(--important); }
  .day-card.review .day-chapter { background: #f0e6ff; color: var(--review); }

  .star-badge {
    display: inline-block; margin-left: 4px;
    color: var(--important); font-size: 0.9rem;
  }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.45); z-index: 1000;
    align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: white; border-radius: 16px;
    max-width: 580px; width: 100%;
    box-shadow: var(--modal-shadow);
    overflow: hidden; animation: slideUp 0.2s ease;
    max-height: 90vh; overflow-y: auto;
  }
  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal-header {
    padding: 22px 24px 16px;
    border-bottom: 1px solid #eee;
    display: flex; justify-content: space-between; align-items: flex-start;
  }
  .modal-header.important { background: var(--important-light); border-bottom-color: #f5c6c6; }
  .modal-header.review { background: var(--review-light); border-bottom-color: #dbbfff; }
  .modal-day-num { font-size: 0.8rem; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1px; }
  .modal-title { font-size: 1.25rem; font-weight: 700; margin-top: 4px; color: var(--primary); }
  .close-btn {
    background: none; border: none; font-size: 1.5rem; cursor: pointer;
    color: #999; padding: 0 0 0 12px; line-height: 1; flex-shrink: 0;
  }
  .close-btn:hover { color: #333; }
  .modal-body { padding: 20px 24px 24px; }

  .modal-section { margin-bottom: 18px; }
  .modal-section-title {
    font-size: 0.78rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; color: #999; margin-bottom: 8px;
  }
  .modal-section p, .modal-section ul { font-size: 0.92rem; line-height: 1.6; color: #333; }
  .modal-section ul { padding-left: 18px; }
  .modal-section li { margin-bottom: 4px; }

  .refs { display: flex; flex-wrap: wrap; gap: 8px; }
  .ref-tag {
    padding: 5px 14px; border-radius: 20px; font-size: 0.82rem; font-weight: 600;
  }
  .ref-vn { background: #e8f8ef; color: var(--tag-vn); border: 1px solid #b7e4ca; }
  .ref-ta { background: #e8f4fd; color: var(--tag-ta); border: 1px solid #aed6f1; }

  .tip-box {
    background: #fffbea; border-left: 4px solid #f9ca24;
    border-radius: 6px; padding: 12px 14px; font-size: 0.88rem;
    line-height: 1.6; color: #555;
  }
  .important-badge {
    display: inline-block; background: var(--important); color: white;
    font-size: 0.75rem; font-weight: 700; padding: 3px 10px;
    border-radius: 12px; margin-bottom: 10px;
  }

  .mark-done-btn {
    width: 100%; padding: 11px; border-radius: 8px; border: none;
    font-size: 0.92rem; font-weight: 600; cursor: pointer; margin-top: 4px;
    background: #eafaf1; color: #27ae60;
    transition: background 0.15s;
  }
  .mark-done-btn:hover { background: #d5f5e3; }
  .mark-done-btn.undone { background: #f8f9fa; color: #999; }

  @media (max-width: 600px) {
    .header h1 { font-size: 1.4rem; }
    .days-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>

</div>

const WEEKS = [
  { label: "Tuần 1", tag: "Thống kê mô tả & Xác suất cơ bản", days: [1,2,3,4,5,6] },
  { label: "Tuần 2", tag: "Xác suất nâng cao & Phân phối rời rạc", days: [7,8,9,10,11,12,13] },
  { label: "Tuần 3", tag: "Phân phối liên tục & CLT", days: [14,15,16,17,18,19,20] },
  { label: "Tuần 4", tag: "Ước lượng & Kiểm định một mẫu", days: [21,22,23,24,25,26] },
  { label: "Tuần 5", tag: "Kiểm định hai mẫu & Tổng kết", days: [27,28,29,30] }
];

const IMPORTANT_DAYS = [3, 5, 15, 20, 21, 25, 29, 30];
const REVIEW_DAYS = [5, 9, 13, 19, 25];

let doneDays = JSON.parse(localStorage.getItem('mas291_done') || '[]');

function saveProgress() {
  try { localStorage.setItem('mas291_done', JSON.stringify(doneDays)); } catch(e){}
  updateProgress();
}

function updateProgress() {
  const pct = Math.round((doneDays.length / 30) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = doneDays.length + ' / 30 ngày hoàn thành';
}

function buildCalendar() {
  const container = document.getElementById('weeksContainer');
  WEEKS.forEach(week => {
    const block = document.createElement('div');
    block.className = 'week-block';
    block.innerHTML = `<div class="week-title">${week.label}: ${week.tag}<span class="week-tag">${week.days.length} ngày</span></div><div class="days-grid" id="grid-${week.label}"></div>`;
    container.appendChild(block);
    const grid = block.querySelector('.days-grid');
    week.days.forEach(d => {
      const dayData = DAYS[d - 1];
      const isImportant = IMPORTANT_DAYS.includes(d);
      const isReview = REVIEW_DAYS.includes(d) && !isImportant;
      const isDone = doneDays.includes(d);
      let typeClass = isImportant ? 'important' : (isReview ? 'review' : 'normal');
      const card = document.createElement('div');
      card.className = `day-card ${typeClass} ${isDone ? 'done' : ''}`;
      card.id = `day-card-${d}`;
      card.innerHTML = `
        <div class="day-num">Ngày ${d}${isImportant ? '<span class="star-badge">⭐</span>' : ''}</div>
        <div class="day-title">${dayData.title}</div>
        <div class="day-chapter">${dayData.chapter}</div>`;
      card.addEventListener('click', () => openModal(d));
      grid.appendChild(card);
    });
  });
}

function openModal(dayNum) {
  const d = DAYS[dayNum - 1];
  const isImportant = IMPORTANT_DAYS.includes(dayNum);
  const isReview = REVIEW_DAYS.includes(dayNum);
  const isDone = doneDays.includes(dayNum);

  const header = document.getElementById('modalHeader');
  header.className = 'modal-header';
  if (isImportant) header.classList.add('important');
  else if (isReview) header.classList.add('review');

  document.getElementById('modalDayNum').textContent = `Ngày ${dayNum} · ${d.chapter}`;
  document.getElementById('modalTitle').textContent = d.title;

  let bodyHTML = '';
  if (isImportant) bodyHTML += `<div class="important-badge">⭐ Ngày quan trọng – Không bỏ qua!</div>`;

  bodyHTML += `<div class="modal-section"><div class="modal-section-title">📚 Topics hôm nay</div><ul>`;
  d.topics.forEach(t => bodyHTML += `<li>${t}</li>`);
  bodyHTML += `</ul></div>`;

  bodyHTML += `<div class="modal-section"><div class="modal-section-title">💡 Lời khuyên</div><div class="tip-box">${d.tip}</div></div>`;

  if (d.refs && d.refs.length) {
    bodyHTML += `<div class="modal-section"><div class="modal-section-title">📖 Tài liệu tham khảo</div><div class="refs">`;
    d.refs.forEach(r => {
      bodyHTML += `<span class="ref-tag ${r.type === 'vn' ? 'ref-vn' : 'ref-ta'}">${r.type === 'vn' ? '🇻🇳' : '🇬🇧'} ${r.text}</span>`;
    });
    bodyHTML += `</div></div>`;
  }

  bodyHTML += `<button class="mark-done-btn ${isDone ? 'undone' : ''}" id="doneBtn" onclick="toggleDone(${dayNum})">
    ${isDone ? '↩ Đánh dấu chưa học' : '✅ Đánh dấu đã hoàn thành'}
  </button>`;

  document.getElementById('modalBody').innerHTML = bodyHTML;
  document.getElementById('modalOverlay').classList.add('active');
}

function toggleDone(dayNum) {
  if (doneDays.includes(dayNum)) {
    doneDays = doneDays.filter(d => d !== dayNum);
  } else {
    doneDays.push(dayNum);
  }
  saveProgress();
  // Update card
  const card = document.getElementById(`day-card-${dayNum}`);
  if (card) {
    if (doneDays.includes(dayNum)) card.classList.add('done');
    else card.classList.remove('done');
  }
  // Update button
  const isDone = doneDays.includes(dayNum);
  const btn = document.getElementById('doneBtn');
  if (btn) {
    btn.textContent = isDone ? '↩ Đánh dấu chưa học' : '✅ Đánh dấu đã hoàn thành';
    btn.className = `mark-done-btn ${isDone ? 'undone' : ''}`;
  }
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

buildCalendar();
updateProgress();
</script>
